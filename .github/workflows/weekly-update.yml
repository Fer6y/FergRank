name: Weekly UFC ingest

# Pulls the past week's UFC fights into the Elo engine and commits the refreshed
# data. The commit triggers Vercel's auto-deploy → a fresh process loads the new
# CSV on boot → rankings go live. See scripts/sherdog/weeklyUpdate.ts.
on:
  schedule:
    # Sundays 11:00 UTC — 6am EST (7am EDT in summer; GitHub cron is UTC-only,
    # no DST awareness). Cards are always done by then (~1am ET); if a one-off
    # card runs late or Sherdog posts slowly, that week's results simply land
    # on the NEXT run — buildRecencyPatch accumulates, nothing is lost.
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'Discovery window in days (how far back to look for UFC cards)'
        required: false
        default: '8'

# Never let two ingests overlap (they write the same data files).
concurrency:
  group: weekly-ufc-ingest
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit + push the refreshed data

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ufc-rankings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ufc-rankings/package-lock.json

      # Persist the Sherdog HTML cache between runs so re-runs don't re-fetch the
      # same card. Starts empty on the very first run (cold start) — that's fine:
      # buildRecencyPatch accumulates into the committed CSV, so nothing is lost.
      - name: Restore Sherdog cache
        uses: actions/cache@v4
        with:
          path: ufc-rankings/data/.sherdog_cache
          key: sherdog-cache-${{ github.run_id }}
          restore-keys: |
            sherdog-cache-

      - name: Install deps
        run: npm ci

      - name: Run weekly ingest
        env:
          SHERDOG_CONTACT: ${{ secrets.SHERDOG_CONTACT }}
        run: node_modules/.bin/jiti scripts/sherdog/weeklyUpdate.ts --days "${{ github.event.inputs.days || '8' }}"

      # Self-healing DOB coverage: new debutants enter the crosswalk above, so
      # this pass picks up their ages (Wikidata + Sherdog). Non-fatal — if
      # Wikidata is down this week, fighter_dob.csv just stays as-is.
      - name: Refresh fighter ages
        continue-on-error: true
        env:
          SHERDOG_CONTACT: ${{ secrets.SHERDOG_CONTACT }}
        run: node_modules/.bin/jiti scripts/registry/buildAges.ts --fetch

      - name: Commit refreshed data
        run: |
          git config user.name  "ufc-rankings-bot"
          git config user.email "actions@github.com"
          git add data/recent_ufc_fights.csv \
                  data/upcoming_fights.csv \
                  data/sherdog_crosswalk.csv \
                  data/sherdog_crosswalk_review.csv \
                  data/canonical/fighter_dob.csv \
                  data/canonical/ages_coverage.txt \
                  data/golden/rankings_snapshot.json
          if git diff --cached --quiet; then
            echo "No data changes this week — nothing to commit."
          else
            # No [skip ci]: this workflow only runs on schedule/dispatch (not push),
            # so the commit can't loop — and [skip ci] would make Vercel skip the
            # deploy we actually want.
            git commit -m "chore(data): weekly UFC ingest $(date -u +%Y-%m-%d)"
            git push
          fi
